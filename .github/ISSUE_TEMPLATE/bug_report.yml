name: Bug Report
description: Report a bug with the submit-sbom-action
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal workflow snippet that triggers the bug
      render: yaml
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Action version
      description: Version tag or commit SHA you're using
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: dropdown
    id: runner
    attributes:
      label: Runner environment
      options:
        - ubuntu-latest
        - ubuntu-22.04
        - ubuntu-24.04
        - other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or other relevant information
    validations:
      required: false
